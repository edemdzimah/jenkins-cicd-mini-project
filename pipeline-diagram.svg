<svg viewBox="0 0 920 470" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowgreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <rect width="920" height="470" fill="#ffffff"/>
  <text x="460" y="38" text-anchor="middle" font-size="24" font-weight="bold" fill="#0f172a">How the CI/CD Loop Works</text>

  <!-- Row 1: Developer -> GitHub -> Jenkins -->
  <rect x="40" y="70" width="180" height="70" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="130" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#1e3a8a">You (Developer)</text>
  <text x="130" y="123" text-anchor="middle" font-size="12" fill="#475569">write and push code</text>

  <line x1="220" y1="105" x2="362" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="291" y="96" text-anchor="middle" font-size="12" fill="#475569">git push</text>

  <rect x="370" y="70" width="180" height="70" rx="10" fill="#f1f5f9" stroke="#334155" stroke-width="2"/>
  <text x="460" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#0f172a">GitHub Repo</text>
  <text x="460" y="123" text-anchor="middle" font-size="12" fill="#475569">code + Jenkinsfile</text>

  <line x1="550" y1="105" x2="692" y2="105" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="621" y="96" text-anchor="middle" font-size="12" fill="#475569">reads Jenkinsfile</text>

  <rect x="700" y="70" width="180" height="70" rx="10" fill="#fef2f2" stroke="#d33833" stroke-width="2"/>
  <text x="790" y="102" text-anchor="middle" font-size="16" font-weight="bold" fill="#991b1b">Jenkins</text>
  <text x="790" y="123" text-anchor="middle" font-size="12" fill="#475569">runs the pipeline</text>

  <line x1="790" y1="140" x2="790" y2="192" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Pipeline container -->
  <rect x="40" y="200" width="840" height="150" rx="12" fill="#f8fafc" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="58" y="226" font-size="14" font-weight="bold" fill="#334155">The Pipeline (the stages defined in your Jenkinsfile)</text>

  <!-- Stage 1 -->
  <rect x="70" y="250" width="170" height="72" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="155" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">1. Checkout</text>
  <text x="155" y="303" text-anchor="middle" font-size="11" fill="#475569">get the code</text>

  <line x1="240" y1="286" x2="272" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2 -->
  <rect x="280" y="250" width="170" height="72" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="365" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">2. Build</text>
  <text x="365" y="303" text-anchor="middle" font-size="11" fill="#475569">install dependencies</text>

  <line x1="450" y1="286" x2="482" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3 -->
  <rect x="490" y="250" width="170" height="72" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="575" y="282" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">3. Test</text>
  <text x="575" y="303" text-anchor="middle" font-size="11" fill="#475569">run the unit tests</text>

  <line x1="660" y1="286" x2="692" y2="286" stroke="#475569" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4 -->
  <rect x="700" y="250" width="170" height="72" rx="8" fill="#ffffff" stroke="#2563eb" stroke-width="2"/>
  <text x="785" y="278" text-anchor="middle" font-size="15" font-weight="bold" fill="#1e3a8a">4. Docker Build</text>
  <text x="785" y="299" text-anchor="middle" font-size="11" fill="#475569">package into an image</text>

  <!-- Feedback loop -->
  <path d="M 60 286 C 18 286, 18 105, 38 105" fill="none" stroke="#16a34a" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#arrowgreen)"/>
  <text x="30" y="195" text-anchor="middle" font-size="11" fill="#16a34a" transform="rotate(-90 30 195)">pass or fail, shown in your browser</text>

  <!-- Fail note -->
  <text x="460" y="395" text-anchor="middle" font-size="13" fill="#991b1b" font-weight="bold">If any stage fails, the pipeline STOPS and the later stages never run.</text>
  <text x="460" y="416" text-anchor="middle" font-size="12" fill="#475569">For example, if Test fails, Docker Build is skipped. That is CI protecting you from shipping a broken change.</text>
</svg>
